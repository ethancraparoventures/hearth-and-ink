<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Your Home | Hearth & Ink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1E1A15;
            --charcoal: #3B3128;
            --parchment: #F3E9D6;
            --cream: #FAF5EB;
            --linen: #ECE3D0;
            --dust: #D6C9B0;
            --rust: #A0614A;
            --rust-light: #C9917A;
            --rust-faint: #E8D0C7;
            --slate-blue: #5A7382;
            --mist-blue: #8AAAB8;
            --fog-blue: #C8DAE2;
            --moss: #4A6350;
            --lichen-green: #6E8C72;
            --sage-green: #9AB89E;
            --pale-sage: #D4E2D5;
            
            --border-radius: 2px;
            --card-padding: 30px;
            --shadow: 2px 3px 0 rgba(30,26,21,0.08), 0 1px 12px rgba(30,26,21,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--parchment);
            color: var(--ink);
            font-family: 'Special Elite', cursive;
            line-height: 1.6;
            overflow-x: hidden;
            padding: 40px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.055; mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container { max-width: 800px; margin: 0 auto; position: relative; }

        /* Full Site Texture Overlay */
        .container::after {
            content: "";
            position: absolute;
            inset: -40px;
            opacity: 0.75;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            mix-blend-mode: multiply;
            z-index: 1000;
        }

        nav { padding: 0 0 60px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; text-decoration: none; color: var(--ink); }

        .upload-card {
            background-color: var(--cream);
            padding: 60px;
            border: 1px solid var(--ink);
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
        }

        .drop-zone {
            border: 2px dashed var(--rust-light);
            padding: 60px;
            background-color: var(--linen);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .drop-zone:hover {
            border-color: var(--rust);
            background-color: var(--parchment);
        }

        .drop-zone p { font-size: 18px; margin-bottom: 10px; }
        .drop-zone span { font-family: 'Courier Prime', monospace; font-size: 11px; text-transform: uppercase; opacity: 0.5; }

        /* Processing State */
        #processing { display: none; margin-top: 40px; }
        .progress-bar {
            width: 100%; height: 12px; background-color: var(--linen); margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .progress-inner {
            width: 0%; height: 100%;
            background: repeating-linear-gradient(45deg, var(--slate-blue), var(--slate-blue) 10px, var(--mist-blue) 10px, var(--mist-blue) 20px);
            background-size: 40px 40px;
            animation: move-stripes 2s linear infinite;
        }
        @keyframes move-stripes { from { background-position: 0 0; } to { background-position: 40px 0; } }

        #status-text { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--rust); text-transform: uppercase; letter-spacing: 0.2em; height: 1.5em; }

        /* Results Card */
        #result { 
            display: none; margin-top: 60px; 
            transform: scaleY(0.96); opacity: 0; transition: all 0.38s ease-out;
        }
        #result.visible { transform: scaleY(1); opacity: 1; }

        .result-frame {
            background-color: white; padding: 20px; border: 1px solid var(--ink); box-shadow: 10px 10px 40px rgba(30,26,21,0.15); position: relative;
        }
        .result-frame img { width: 100%; height: auto; filter: grayscale(100%) contrast(1.2); }

        /* Buttons with Stamp Feel and Clean Textured Edges */
        .btn {
            display: inline-block;
            padding: 18px 32px;
            font-family: 'Special Elite', cursive;
            font-size: 14px;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            position: relative;
            /* Simple hard shadow only, no blur */
            box-shadow: 6px 6px 0 var(--rust);
            border: 1px solid var(--ink);
            margin-top: 30px;
        }

        .btn-download { background-color: var(--slate-blue); color: var(--parchment); box-shadow: 6px 6px 0 var(--moss); border: 1px solid var(--ink); }
        .btn-download:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--moss); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">Hearth & Ink</a>
        </nav>

        <div id="upload-stage" class="upload-card">
            <h2 style="margin-bottom: 10px;">Send us your home.</h2>
            <p style="font-size: 14px; opacity: 0.6; margin-bottom: 40px;">Select a clear photo of the front of your residence.</p>
            
            <div id="drop-zone" class="drop-zone">
                <p>Drop your photo here</p>
                <span>or click to browse locally</span>
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>
        </div>

        <div id="processing" class="upload-card">
            <h2 style="margin-bottom: 10px;">Inking your memory...</h2>
            <div class="progress-bar"><div class="progress-inner" id="progress"></div></div>
            <div id="status-text"></div>
        </div>

        <div id="result">
            <div class="result-frame">
                <img src="https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&q=80&w=800" alt="Resulting Illustration">
            </div>
            <div style="text-align: center;">
                <a href="pricing.html" class="btn btn-download">Download High-Res — $49</a>
                <p style="margin-top: 20px; font-size: 10px; font-family: 'Courier Prime'; opacity: 0.4;">SERIES 02 / BUNGALOW RENDER / MMXXVI</p>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadStage = document.getElementById('upload-stage');
        const processing = document.getElementById('processing');
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('status-text');
        const result = document.getElementById('result');

        const statuses = [
            "Extracting architectural DNA...",
            "Tracing structural outlines...",
            "Applying artisan soul pass...",
            "Inking hand-drawn textures...",
            "Finalizing your masterpiece..."
        ];

        function typeWriter(text, i, callback) {
            if (i < text.length) {
                statusText.innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1, callback), 35);
            } else if (callback) {
                setTimeout(callback, 800);
            }
        }

        function runStatusLoop(index) {
            if (index < statuses.length) {
                typeWriter(statuses[index], 0, () => {
                    runStatusLoop(index + 1);
                });
                progress.style.width = ((index + 1) / statuses.length) * 100 + '%';
            } else {
                showResult();
            }
        }

        function showResult() {
            processing.style.display = 'none';
            result.style.display = 'block';
            setTimeout(() => {
                result.classList.add('visible');
            }, 50);
        }

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                uploadStage.style.display = 'none';
                processing.style.display = 'block';
                runStatusLoop(0);
            }
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.backgroundColor = 'var(--parchment)'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.backgroundColor = 'var(--linen)'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadStage.style.display = 'none';
            processing.style.display = 'block';
            runStatusLoop(0);
        });
    </script>
</body>
</html>
