<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Your Home | Hearth & Ink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1E1A15;
            --charcoal: #3B3128;
            --parchment: #F3E9D6;
            --cream: #FAF5EB;
            --linen: #ECE3D0;
            --dust: #D6C9B0;
            --rust: #A0614A;
            --rust-light: #C9917A;
            --rust-faint: #E8D0C7;
            --slate-blue: #5A7382;
            --mist-blue: #8AAAB8;
            --fog-blue: #C8DAE2;
            --moss: #4A6350;
            --lichen-green: #6E8C72;
            --sage-green: #9AB89E;
            --pale-sage: #D4E2D5;
            
            --border-radius: 2px;
            --shadow-hard: 4px 4px 0px var(--ink);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--parchment);
            color: var(--ink);
            font-family: 'Special Elite', cursive;
            line-height: 1.4;
            overflow-x: hidden;
            padding: 20px;
        }

        /* The Non-Negotiable Grain Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.055;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Decorative Large Background "Ink Splashes" */
        .splash {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.25;
            pointer-events: none;
        }
        .splash-1 { top: -10%; right: -10%; width: 600px; height: 600px; background: var(--mist-blue); }
        .splash-2 { bottom: -10%; left: -10%; width: 500px; height: 500px; background: var(--lichen-green); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid var(--ink);
            background-color: var(--cream);
            position: relative;
            min-height: 100vh;
            box-shadow: 12px 12px 0px rgba(30,26,21,0.05);
        }

        /* EXTREME Luxury Cotton Card Stock Texture Overlay */
        .container::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.75;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            mix-blend-mode: multiply;
            z-index: 1000;
        }

        /* Ripped Edge Header */
        nav {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--dust);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-style: italic;
            font-weight: 900;
            text-decoration: none;
            color: var(--ink);
            transform: rotate(-1deg);
            display: inline-block;
        }

        .nav-links {
            display: flex; gap: 40px;
            font-family: 'Courier Prime', monospace;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em;
        }
        .nav-links a { text-decoration: none; color: var(--ink); opacity: 0.6; }

        .content-area {
            padding: 80px 60px;
            background-image: repeating-linear-gradient(var(--linen) 0px, var(--linen) 1px, transparent 1px, transparent 32px);
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .upload-zone {
            width: 100%;
            max-width: 600px;
            border: 2px dashed var(--dust);
            background-color: white;
            padding: 80px 40px;
            margin-top: 40px;
            cursor: pointer;
            box-shadow: 10px 10px 0px var(--charcoal);
            transition: all 0.2s;
        }
        .upload-zone:hover { border-color: var(--rust); background-color: var(--parchment); }

        .btn {
            display: inline-block;
            padding: 24px 48px;
            font-family: 'Special Elite', cursive;
            font-size: 16px;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: 1px solid var(--ink);
        }

        .btn-primary { background-color: var(--ink); color: var(--parchment); box-shadow: 6px 6px 0 var(--rust); }
        .btn-download { background-color: var(--slate-blue); color: var(--parchment); box-shadow: 6px 6px 0 var(--moss); }

        /* Processing/Result styles... simplified for consistency */
        #processing { display: none; width: 100%; max-width: 600px; padding: 60px; }
        .progress-bar { width: 100%; height: 12px; background-color: var(--linen); margin-bottom: 20px; overflow: hidden; border: 1px solid var(--ink); }
        .progress-inner { width: 0%; height: 100%; background: repeating-linear-gradient(45deg, var(--slate-blue), var(--slate-blue) 10px, var(--mist-blue) 10px, var(--mist-blue) 20px); animation: move-stripes 2s linear infinite; }
        @keyframes move-stripes { from { background-position: 0 0; } to { background-position: 40px 0; } }

        #result { display: none; margin-top: 60px; width: 100%; max-width: 800px; }
        .result-frame { background-color: white; padding: 15px; border: 1px solid var(--ink); box-shadow: 20px 20px 0px var(--charcoal); transform: rotate(1deg); }
        .result-frame img { width: 100%; filter: grayscale(100%) contrast(1.1); border: 1px solid var(--dust); }

        footer { padding: 60px; display: flex; justify-content: space-between; font-family: 'Courier Prime', monospace; font-size: 10px; opacity: 0.5; letter-spacing: 0.4em; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="splash splash-1"></div>
    <div class="splash splash-2"></div>

    <div class="container">
        <nav>
            <a href="index.html" class="logo">The Drawn House.</a>
            <div class="nav-links">
                <a href="gallery.html">The Gallery</a>
                <a href="pricing.html">The Studio</a>
                <a href="upload.html" style="color: var(--rust); opacity: 1;">Order Yours</a>
            </div>
        </nav>

        <div class="content-area">
            <div id="upload-stage">
                <span style="font-family: 'Courier Prime'; font-size: 9px; color: var(--rust); letter-spacing: 0.5em; text-transform: uppercase;">PORTRAIT COMMISSION</span>
                <h2 style="font-family: 'Playfair Display'; font-size: 64px; margin: 20px 0;">Send us your home.</h2>
                <div id="drop-zone" class="upload-zone">
                    <p style="font-size: 20px;">Drop your photo here</p>
                    <p style="font-family: 'Courier Prime'; font-size: 11px; opacity: 0.4; margin-top: 10px; text-transform: uppercase;">or click to browse</p>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
            </div>

            <div id="processing">
                <h2 style="font-family: 'Playfair Display'; font-size: 42px; margin-bottom: 30px;">Inking your memory...</h2>
                <div class="progress-bar"><div class="progress-inner" id="progress"></div></div>
                <div id="status-text" style="font-family: 'Courier Prime'; font-size: 12px; color: var(--rust); text-transform: uppercase; letter-spacing: 0.2em;"></div>
            </div>

            <div id="result">
                <div class="result-frame">
                    <img src="https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&q=80&w=800" alt="Result">
                </div>
                <div style="margin-top: 60px;">
                    <a href="pricing.html" class="btn btn-download">Download Masterpiece &mdash; $49</a>
                </div>
            </div>
        </div>

        <footer>
            <span>ESTABLISHED MMXXVI</span>
            <span>HEARTH & INK &bull; ARTISAN STUDIO</span>
        </footer>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadStage = document.getElementById('upload-stage');
        const processing = document.getElementById('processing');
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('status-text');
        const result = document.getElementById('result');

        const statuses = ["Extracting DNA...", "Tracing structure...", "Applying soul pass...", "Finalizing ink..."];

        function typeWriter(text, i, callback) {
            if (i < text.length) {
                statusText.innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1, callback), 35);
            } else if (callback) setTimeout(callback, 800);
        }

        function runStatusLoop(index) {
            if (index < statuses.length) {
                typeWriter(statuses[index], 0, () => runStatusLoop(index + 1));
                progress.style.width = ((index + 1) / statuses.length) * 100 + '%';
            } else {
                processing.style.display = 'none';
                result.style.display = 'block';
            }
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                uploadStage.style.display = 'none';
                processing.style.display = 'block';
                runStatusLoop(0);
            }
        });
    </script>
</body>
</html>
