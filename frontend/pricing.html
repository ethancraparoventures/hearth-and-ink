<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing | Hearth & Ink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1E1A15; --charcoal: #3B3128; --parchment: #F3E9D6; --cream: #FAF5EB; --linen: #ECE3D0; --dust: #D6C9B0; --rust: #A0614A; --shadow: 2px 3px 0 rgba(30,26,21,0.08), 0 1px 12px rgba(30,26,21,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--parchment); color: var(--ink); font-family: 'Special Elite', cursive; line-height: 1.6; padding: 40px; }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.055; mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .container { max-width: 900px; margin: 0 auto; position: relative; }
        
        /* Full Site Texture Overlay */
        .container::after {
            content: "";
            position: absolute;
            inset: -40px;
            opacity: 0.75;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            mix-blend-mode: multiply;
            z-index: 1000;
        }

        nav { padding: 0 0 80px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; text-decoration: none; color: var(--ink); }
        .section-label { font-family: 'Courier Prime', monospace; font-size: 9px; text-transform: uppercase; color: var(--rust); letter-spacing: 0.42em; opacity: 0.65; display: block; margin-bottom: 2rem; text-align: center; }
        h2 { font-size: 48px; text-align: center; margin-bottom: 80px; font-family: 'Playfair Display', serif; }

        .pricing-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .pricing-card { background-color: var(--cream); border: 1px solid var(--ink); padding: 60px; box-shadow: var(--shadow); text-align: center; position: relative; overflow: hidden; }
        .pricing-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background-color: var(--rust); }
        
        .price { font-size: 64px; font-family: 'Playfair Display', serif; color: var(--charcoal); margin: 20px 0; }
        .price span { font-size: 24px; opacity: 0.4; }
        
        .features-list { list-style: none; margin: 40px 0; }
        .features-list li { padding: 10px 0; border-bottom: 1px dotted var(--dust); font-size: 14px; opacity: 0.8; }
        .features-list li:last-child { border-bottom: none; }

        /* Buttons with Stamp Feel and Fuzzy Textured Edges */
        .btn {
            display: inline-block;
            padding: 18px 40px;
            font-family: 'Special Elite', cursive;
            font-size: 16px;
            text-decoration: none;
            background-color: var(--charcoal);
            color: var(--parchment);
            transition: all 0.1s;
            cursor: pointer;
            border-radius: 2px;
            /* Fuzzy ink-bleed / paper-grain edge effect */
            box-shadow: 6px 6px 0 var(--rust), 0 0 2px 1px var(--ink);
            border: 1px solid var(--ink);
        }
        .btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--rust); }
    </style>
</head>
<body>
    <div class="container">
        <nav><a href="index.html" class="logo">Hearth & Ink</a></nav>
        
        <span class="section-label">COMMISSIONS</span>
        <h2>Simple, <i>honest</i> pricing.</h2>

        <div class="pricing-grid">
            <div class="pricing-card">
                <span class="section-label">DIGITAL MASTERPIECE</span>
                <div class="price">$49<span>.00</span></div>
                <ul class="features-list">
                    <li>One high-resolution digital illustration</li>
                    <li>24-hour delivery to your inbox</li>
                    <li>Print-ready file (up to 24" x 36")</li>
                    <li>Full personal use license</li>
                </ul>
                <a href="upload.html" class="btn">Start Your Sketch</a>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 60px;">
            <p style="font-family: 'Courier Prime'; font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.2em;">&bull; Hand-crafted with soul &bull; Delivered with care &bull;</p>
        </div>
    </div>
</body>
</html>
