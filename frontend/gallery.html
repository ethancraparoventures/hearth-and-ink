<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Hearth & Ink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1E1A15;
            --charcoal: #3B3128;
            --parchment: #F3E9D6;
            --cream: #FAF5EB;
            --linen: #ECE3D0;
            --dust: #D6C9B0;
            --rust: #A0614A;
            --rust-light: #C9917A;
            --rust-faint: #E8D0C7;
            --slate-blue: #5A7382;
            --mist-blue: #8AAAB8;
            --fog-blue: #C8DAE2;
            --moss: #4A6350;
            --lichen-green: #6E8C72;
            --sage-green: #9AB89E;
            --pale-sage: #D4E2D5;
            
            --border-radius: 2px;
            --shadow-hard: 4px 4px 0px var(--ink);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--parchment);
            color: var(--ink);
            font-family: 'Special Elite', cursive;
            line-height: 1.4;
            overflow-x: hidden;
            padding: 20px;
        }

        /* The Non-Negotiable Grain Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.055;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Decorative Large Background "Ink Splashes" */
        .splash {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.25;
            pointer-events: none;
        }
        .splash-1 { top: -10%; right: -10%; width: 600px; height: 600px; background: var(--mist-blue); }
        .splash-2 { bottom: -10%; left: -10%; width: 500px; height: 500px; background: var(--lichen-green); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid var(--ink);
            background-color: var(--cream);
            position: relative;
            min-height: 100vh;
            box-shadow: 12px 12px 0px rgba(30,26,21,0.05);
        }

        /* EXTREME Luxury Cotton Card Stock Texture Overlay */
        .container::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.75; /* Extreme visibility for tactile stationery feel */
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            mix-blend-mode: multiply;
            z-index: 1000;
        }

        /* Ripped Edge Header */
        nav {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--dust);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-style: italic;
            font-weight: 900;
            text-decoration: none;
            color: var(--ink);
            transform: rotate(-1deg);
            display: inline-block;
        }

        .nav-links {
            display: flex; gap: 40px;
            font-family: 'Courier Prime', monospace;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em;
        }
        .nav-links a { text-decoration: none; color: var(--ink); opacity: 0.6; }

        .gallery-header {
            padding: 80px 60px 40px;
            text-align: center;
            background-image: repeating-linear-gradient(var(--linen) 0px, var(--linen) 1px, transparent 1px, transparent 32px);
            border-bottom: 1px solid var(--ink);
        }

        .gallery-grid {
            padding: 60px;
            display: grid;
            gap: 100px;
        }

        .gallery-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .frame-photo, .frame-ink {
            background-color: white;
            padding: 10px;
            border: 1px solid var(--ink);
            box-shadow: 10px 10px 0 var(--dust);
        }

        .frame-ink {
            box-shadow: 15px 15px 0 var(--charcoal);
            transform: rotate(1.5deg);
        }

        .gallery-pair img { width: 100%; display: block; }
        .frame-ink img { filter: grayscale(100%) contrast(1.1); }

        .cta-section {
            padding: 100px 60px;
            text-align: center;
            border-top: 1px solid var(--ink);
            background-color: var(--charcoal);
            color: var(--parchment);
        }

        .btn {
            display: inline-block;
            padding: 24px 48px;
            font-family: 'Special Elite', cursive;
            font-size: 16px;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: 1px solid var(--ink);
            background-color: var(--cream);
            color: var(--ink);
            box-shadow: 6px 6px 0 var(--rust);
        }
        .btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--rust); }

        footer { padding: 60px; display: flex; justify-content: space-between; font-family: 'Courier Prime', monospace; font-size: 10px; opacity: 0.5; letter-spacing: 0.4em; }

        @media (max-width: 900px) { .gallery-pair { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="splash splash-1"></div>
    <div class="splash splash-2"></div>

    <div class="container">
        <nav>
            <a href="index.html" class="logo">The Drawn House.</a>
            <div class="nav-links">
                <a href="gallery.html">The Gallery</a>
                <a href="pricing.html">The Studio</a>
                <a href="upload.html" style="color: var(--rust); opacity: 1;">Order Yours</a>
            </div>
        </nav>

        <div class="gallery-header">
            <span style="font-family: 'Courier Prime'; font-size: 9px; color: var(--rust); letter-spacing: 0.5em; text-transform: uppercase;">ARTISAN ARCHIVE</span>
            <h2 style="font-family: 'Playfair Display'; font-size: 84px; margin-top: 20px;">Recent <br><i>Works</i>.</h2>
        </div>

        <div class="gallery-grid">
            <div class="gallery-pair">
                <div class="frame-photo"><img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?auto=format&fit=crop&q=80&w=600" alt="House"></div>
                <div class="frame-ink"><img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?auto=format&fit=crop&q=80&w=600" alt="Ink"></div>
            </div>
            <div class="gallery-pair">
                <div class="frame-photo"><img src="https://images.unsplash.com/photo-1480074568708-e7b720bb3f09?auto=format&fit=crop&q=80&w=600" alt="House"></div>
                <div class="frame-ink"><img src="https://images.unsplash.com/photo-1480074568708-e7b720bb3f09?auto=format&fit=crop&q=80&w=600" alt="Ink"></div>
            </div>
        </div>

        <div class="cta-section">
            <h3 style="font-family: 'Playfair Display'; font-size: 48px; margin-bottom: 40px;">Your home <br><i>belongs</i> here.</h3>
            <a href="upload.html" class="btn">Begin Your Commission</a>
        </div>

        <footer>
            <span>ESTABLISHED MMXXVI</span>
            <span>HEARTH & INK &bull; ARTISAN STUDIO</span>
        </footer>
    </div>
</body>
</html>
